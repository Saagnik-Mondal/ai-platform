# ================================================
# ML Sentinel — Docker Compose Orchestration
# ================================================
# Services: PostgreSQL, MinIO, MLflow, FastAPI API, Prometheus, Grafana
# ================================================

services:
  # ------------------------------------------------
  # PostgreSQL — Metadata + Prediction Logs
  # ------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Create an additional database for MLflow
      POSTGRES_MULTIPLE_DATABASES: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/create-mlflow-db.sh:/docker-entrypoint-initdb.d/00-create-mlflow-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network
    restart: unless-stopped

  # ------------------------------------------------
  # MinIO — S3-compatible Artifact Storage
  # ------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: sentinel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network
    restart: unless-stopped

  # ------------------------------------------------
  # MinIO Setup — Create initial bucket
  # ------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    container_name: sentinel-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb minio/mlflow-artifacts --ignore-existing;
      mc anonymous set download minio/mlflow-artifacts;
      echo 'MinIO bucket created successfully';
      "
    networks:
      - sentinel-network

  # ------------------------------------------------
  # MLflow — Experiment Tracking & Model Registry
  # ------------------------------------------------
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: sentinel-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sentinel-network
    restart: unless-stopped

  # ------------------------------------------------
  # FastAPI — Inference API
  # ------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sentinel-api
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MODEL_NAME: ${MODEL_NAME}
      DRIFT_CHECK_INTERVAL_MINUTES: ${DRIFT_CHECK_INTERVAL_MINUTES}
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD}
      REFERENCE_DATA_SIZE: ${REFERENCE_DATA_SIZE}
      CURRENT_DATA_WINDOW: ${CURRENT_DATA_WINDOW}
      RETRAIN_MIN_SAMPLES: ${RETRAIN_MIN_SAMPLES}
      RETRAIN_IMPROVEMENT_THRESHOLD: ${RETRAIN_IMPROVEMENT_THRESHOLD}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sentinel-network
    restart: unless-stopped

  # ------------------------------------------------
  # Model Trainer — Initial model training job
  # ------------------------------------------------
  trainer:
    build:
      context: ./training
      dockerfile: Dockerfile
    container_name: sentinel-trainer
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MODEL_NAME: ${MODEL_NAME}
      REFERENCE_DATA_SIZE: ${REFERENCE_DATA_SIZE}
    volumes:
      - ./data:/app/data
    networks:
      - sentinel-network

  # ------------------------------------------------
  # Prometheus — Metrics Collection
  # ------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network
    restart: unless-stopped

  # ------------------------------------------------
  # Grafana — Dashboards & Visualization
  # ------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network
    restart: unless-stopped

# ------------------------------------------------
# Volumes
# ------------------------------------------------
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ------------------------------------------------
# Network
# ------------------------------------------------
networks:
  sentinel-network:
    driver: bridge
    name: sentinel-network
